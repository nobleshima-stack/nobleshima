<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挨拶トーンアップ・システム</title>
    <style>
        :root { --orange: #FF6B35; --bg: #FFFBF5; --green: #00896F; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--orange); color: white; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .settings { background: #eee; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; }
        .settings label { font-size: 14px; font-weight: bold; }
        video { width: 100%; max-width: 400px; border: 5px solid var(--orange); border-radius: 15px; background: #000; }
        .status-badge { display: inline-block; padding: 10px 20px; border-radius: 20px; font-weight: bold; margin-top: 15px; }
        .active { background: #D6F5EC; color: var(--green); }
        .waiting { background: #eee; color: #666; }
        .cooldown { background: #E0F4FF; color: #0077B6; }
    </style>
</head>
<body>

<div id="overlay" onclick="startSystem()">
    <h1 style="font-size:40px;">START</h1>
    <p>10種の挨拶を順番に再生します（Edge最適化版）</p>
</div>

<div class="container">
    <h2 style="color:var(--orange);">😊 挨拶トーンアップ・システム</h2>
    <div class="settings">
        <label>開始 <input type="time" id="start-time" value="06:40"></label>
        <label>終了 <input type="time" id="end-time" value="10:00"></label>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <div id="status" class="status-badge waiting">準備中</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    let model = null;
    let isCooldown = false;
    let messageIndex = 0;

    const messages = [
        "おはようございます。今日も一日、元気に、いきましょう！",
        "おはようございます。笑顔で、明るい職場を、作っていきませんか？",
        "おはようございます。いつもより少しだけ、高い声で、挨拶してみましょう！",
        "おはようございます。今日も、気持ちの良い挨拶から、始めましょうね。",
        "おはようございます。今日もあなたにとって、良い一日に、なりますように。",
        "おはようございます。一生懸命なあなたのこと、応援していますね！",
        "おはようございます。みんなの明るい声が響くと、嬉しいです！",
        "おはようございます。新しい一歩、一緒に、踏み出していきましょうね。",
        "おはようございます。爽やかな挨拶で、心もトーンアップ、しませんか？",
        "おはようございます。今日も素敵な笑顔で、いってらっしゃい！"
    ];

    async function startSystem() {
        document.getElementById('overlay').style.display = 'none';
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); 
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            status.innerText = "モデル読み込み中...";
            model = await cocoSsd.load();
            setInterval(detect, 1000);
        } catch (err) {
            alert("カメラの許可、またはライブラリの読み込みに失敗しました。");
            console.error(err);
        }
    }

    async function detect() {
        const now = new Date();
        const start = document.getElementById('start-time').value.split(':');
        const end = document.getElementById('end-time').value.split(':');
        const currentMin = now.getHours() * 60 + now.getMinutes();
        const startMin = parseInt(start[0]) * 60 + parseInt(start[1]);
        const endMin = parseInt(end[0]) * 60 + parseInt(end[1]);

        if (currentMin < startMin || currentMin >= endMin) {
            status.innerText = "稼働時間外";
            status.className = "status-badge waiting";
            return;
        }

        if (isCooldown || !model) return;

        status.innerText = "検知中...";
        status.className = "status-badge active";

        const predictions = await model.detect(video);
        const person = predictions.find(p => p.class === 'person' && p.score > 0.6);

        if (person) {
            const text = messages[messageIndex];
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            
            const voices = window.speechSynthesis.getVoices();
            // Edgeの「Nanami Online (Natural)」を最優先で探す
            const edgeVoice = voices.find(v => v.name.includes("Nanami") && v.name.includes("Online")) || 
                              voices.find(v => v.name.includes("Google") && v.lang === "ja-JP") ||
                              voices.find(v => v.lang === "ja-JP");
            
            if (edgeVoice) {
                uttr.voice = edgeVoice;
                uttr.pitch = 1.05; 
                uttr.rate = 1.0; 
            } else {
                uttr.pitch = 1.2;
                uttr.rate = 1.1;
            }
            
            window.speechSynthesis.speak(uttr);

            messageIndex = (messageIndex + 1) % messages.length;
            isCooldown = true;
            status.innerText = "挨拶完了（10秒待機）";
            status.className = "status-badge cooldown";
            setTimeout(() => { isCooldown = false; }, 10000);
        }
    }

    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>
</body>
</html>
